<header class="main-header">
  <div class="header-container">
    <a routerLink="/" class="brand" aria-label="Ir al inicio">
      <img src="/logo.png" alt="SplitItEasy logo" class="brand-logo" />
      <span class="brand-name">SplitItEasy</span>
    </a>

    <button
      class="menu-toggle"
      type="button"
      aria-label="Abrir menú"
      (click)="toggleMenu()">
      ☰
    </button>

    <nav class="nav" [class.nav-open]="isMenuOpen">
      <a routerLink="/inicio" (click)="closeMenu()">Inicio</a>
      <a routerLink="/upgrade" (click)="closeMenu()">Upgrade</a>
      <a routerLink="/como-funciona" (click)="closeMenu()">Cómo funciona</a>
      <a routerLink="/contacto" (click)="closeMenu()">Contacto</a>
      <a routerLink="/login">Login</a>
      <a routerLink="/technologies">Tecnologías</a>
      <a routerLink="/login" [queryParams]="{ mode: 'register' }" class="nav-cta" (click)="closeMenu()">
        Empieza gratis
      </a>
    </nav>

    <div class="header-info">
      <span class="greeting">{{ '' | greeting }}, usuario</span>
      <span class="date">Hoy es {{ today | date:'fullDate' }}</span>
    </div>
  </div>
</header>

<section class="chatbot-section">
  <div class="chatbot-container">
    <div class="chatbot-card">

      <div class="chat-header">
  <img src="coin.png" alt="AI coin" class="chat-avatar" />
  
  <div class="chat-title">
    <h2>Asistente de SplitItEasy</h2>
  </div>
</div>

      <p>Pregúntame sobre presupuestos, gastos compartidos o cómo usar la plataforma.</p>

      <div class="chat-response" *ngIf="aiResponse">
        <strong>SplitItEasy AI:</strong>
        <p>{{ aiResponse }}</p>
      </div>

      <div class="chat-input-row">
        <input
          type="text"
          [(ngModel)]="userMessage"
          name="userMessage"
          placeholder="Escribe tu pregunta aquí..."
          class="chat-input"
          (keyup.enter)="sendMessage()"
        />

        <button
          type="button"
          class="chat-btn"
          (click)="sendMessage()">
          Enviar
        </button>
      </div>

    </div>
  </div>
</section>
