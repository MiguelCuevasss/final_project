<header class="main-header">
  <div class="header-container">

    <a routerLink="/" class="brand">
      <img src="/logo.png" class="brand-logo" />
      <span class="brand-name">SplitItEasy</span>
    </a>

    <button class="menu-toggle" (click)="toggleMenu()">☰</button>

    <nav class="nav" [class.nav-open]="isMenuOpen">
      <a routerLink="/inicio" (click)="closeMenu()">Inicio</a>
      <a routerLink="/upgrade" (click)="closeMenu()">Upgrade</a>
      <a routerLink="/login">Login</a>
      <a routerLink="/technologies">Tecnologías</a>
      <a routerLink="/login" [queryParams]="{ mode: 'register' }" class="nav-cta">
        Empieza gratis
      </a>
    </nav>

    <div class="header-info">
      <span class="greeting">{{ '' | greeting }}, usuario</span>
      <span class="date">Hoy es {{ today | date:'fullDate' }}</span>
    </div>

  </div>
</header>
