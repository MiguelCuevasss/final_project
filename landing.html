<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="hero">
  <div class="container">

    <!-- LEFT -->

      <div class="badge">

        Divide gastos.<br>

        Empieza gratis →
      </button>

    <!-- RIGHT -->
    <div class="right">
      <div class="circle">
